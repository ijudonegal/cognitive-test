
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Intelligence Test</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:#e5e7eb;
    margin:0;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
}
h1{
    text-align:center;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}
button{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    cursor:pointer;
    font-weight:bold;
}
.option{
    margin-top:8px;
}
.result{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
.leaderboard table{
    width:100%;
    border-collapse:collapse;
}
.leaderboard td, .leaderboard th{
    border-bottom:1px solid #334155;
    padding:8px;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h1>Cognitive Intelligence Test</h1>

<div class="card">
<label>Your Name</label>
<input id="username" style="width:100%;padding:8px;border-radius:6px;border:none;margin-top:5px;">
</div>

<div class="card" id="quiz"></div>

<div class="card">
<button onclick="submitTest()">Submit Test</button>
</div>

<div class="card result">

<div>
<h3>Cognitive Profile</h3>
<canvas id="radarChart"></canvas>
</div>

<div>
<h3>Comparison vs Average</h3>
<canvas id="barChart"></canvas>
</div>

</div>

<div class="card">
<h3>Result</h3>
<p id="summary"></p>
<p id="type"></p>
<p id="iq"></p>
</div>

<div class="card leaderboard">
<h3>Leaderboard</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Score</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>
</div>

</div>

<script>

const questions=[
{q:"You see pattern: 2,6,12,20,30, ?",a:42,type:"logic"},
{q:"What number continues: 1,3,6,10,15, ?",a:21,type:"logic"},
{q:"If a system becomes larger, complexity usually:",a:"increase",type:"system"},
{q:"Best way to win debates:",a:"structured argument",type:"debate"},
{q:"If pattern feels familiar without calculation:",a:"intuition",type:"intuition"}
]

const avg={system:50,logic:55,debate:52,intuition:58}

function renderQuiz(){
let html=""
questions.forEach((q,i)=>{
html+=`<div class='q'>
<p><b>${i+1}. ${q.q}</b></p>
<input id='q${i}' placeholder='Answer'>
</div>`
})
document.getElementById("quiz").innerHTML=html
}

renderQuiz()

function submitTest(){

let scores={system:0,logic:0,debate:0,intuition:0}

questions.forEach((q,i)=>{

let val=document.getElementById("q"+i).value.toLowerCase()

if(val){
if(q.type=="logic") scores.logic+=20
if(q.type=="system") scores.system+=20
if(q.type=="debate") scores.debate+=20
if(q.type=="intuition") scores.intuition+=20
}

})

let st=scores.system
let cc=scores.logic
let dl=scores.debate
let ir=scores.intuition

let avgUser=(st+cc+dl+ir)/4
let avgHuman=(avg.system+avg.logic+avg.debate+avg.intuition)/4

let achievement=((avgUser/avgHuman)*100).toFixed(1)

document.getElementById("summary").innerHTML=
"User Score Average: "+avgUser.toFixed(1)+"<br>"+
"Human Average: "+avgHuman.toFixed(1)+"<br>"+
"Achievement: "+achievement+"%"

document.getElementById("iq").innerHTML="Estimated IQ Range: "+estimateIQ(avgUser)
document.getElementById("type").innerHTML="Dominant Type: "+thinkerType(st,cc,dl,ir)

drawCharts(st,cc,dl,ir)

saveLeaderboard(avgUser)

}

function estimateIQ(score){

if(score<55) return "90–100"
if(score<65) return "100–110"
if(score<75) return "110–120"
if(score<85) return "120–130"
return "130+"

}

function thinkerType(st,cc,dl,ir){

let max=Math.max(st,cc,dl,ir)

if(max==st) return "Systems Strategist"
if(max==cc) return "Logical Analyst"
if(max==dl) return "Debate Thinker"
if(max==ir) return "Intuitive Reader"

return "Balanced"

}

let radarChart
let barChart

function drawCharts(st,cc,dl,ir){

if(radarChart) radarChart.destroy()
if(barChart) barChart.destroy()

radarChart=new Chart(
document.getElementById("radarChart"),
{
type:"radar",
data:{
labels:["System","Logic","Debate","Intuition"],
datasets:[
{label:"User",data:[st,cc,dl,ir]},
{label:"Average",data:[avg.system,avg.logic,avg.debate,avg.intuition]}
]
}
}
)

barChart=new Chart(
document.getElementById("barChart"),
{
type:"bar",
data:{
labels:["System","Logic","Debate","Intuition"],
datasets:[
{label:"User",data:[st,cc,dl,ir]},
{label:"Average",data:[avg.system,avg.logic,avg.debate,avg.intuition]}
]
}
}
)

}

function saveLeaderboard(score){

let name=document.getElementById("username").value || "Anonymous"

let board=JSON.parse(localStorage.getItem("cogboard")||"[]")

board.push({name:name,score:score.toFixed(1)})

board.sort((a,b)=>b.score-a.score)

board=board.slice(0,10)

localStorage.setItem("cogboard",JSON.stringify(board))

renderBoard()

}

function renderBoard(){

let board=JSON.parse(localStorage.getItem("cogboard")||"[]")

let html=""

board.forEach(r=>{
html+=`<tr><td>${r.name}</td><td>${r.score}</td></tr>`
})

document.getElementById("board").innerHTML=html

}

renderBoard()

</script>

</body>
</html>
